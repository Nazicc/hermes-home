# Hermes Security — Block PostgreSQL port 5432 from external access
# Docker Desktop on macOS auto-exposes container ports via vpnkit.
# This pf anchor blocks inbound TCP 5432 from non-localhost interfaces.
# Load with: sudo pfctl -a hermes/block-pg -f /Users/can/.hermes/security/pf-block-pg.conf

# Block inbound PostgreSQL from external interfaces, allow localhost
block in proto tcp from any to any port 5432
pass in proto tcp from 127.0.0.1 to any port 5432
pass in proto tcp from ::1 to any port 5432
